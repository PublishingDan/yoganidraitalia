<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/fonts/fonts.css">
<title>Grazie · Yoga Nidra Italia™</title>
<meta name="description" content="Grazie per averci scritto. Ti risponderemo personalmente al più presto.">
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg-base:#0a0c1f; --bg-card:#181b35; --gold:#c9a45c; --gold-bright:#e8d3a8;
  --text-primary:#f5f1e8; --text-dim:#d4cdb8; --line-strong:rgba(201,164,92,0.25);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Manrope',sans-serif; background:var(--bg-base); color:var(--text-primary);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  text-align:center; padding:2rem; font-weight:300; line-height:1.65;
}
.box{max-width:560px}
.logo{width:64px;margin:0 auto 2rem;display:block}
.eyebrow{
  font-family:'Playfair Display',serif; font-style:italic; color:var(--gold);
  letter-spacing:0.05em; font-size:1.1rem; margin-bottom:1rem; display:block;
}
h1{
  font-family:'Playfair Display',serif; font-weight:400;
  font-size:clamp(2rem,6vw,3.25rem); line-height:1.05; margin-bottom:1.25rem;
}
h1 em{font-style:italic;color:var(--gold-bright)}
p{color:var(--text-dim); font-size:1.05rem; margin-bottom:2.25rem}
.btn{
  display:inline-block; background:var(--gold); color:var(--bg-base);
  padding:0.9rem 2rem; border-radius:6px; font-weight:500; text-decoration:none;
  transition:background .25s ease, transform .25s ease;
}
.btn:hover{background:var(--gold-bright); transform:translateY(-2px)}
</style>
  <link rel="stylesheet" href="/assets/cookieconsent/cookieconsent.css">
  <link rel="stylesheet" href="/assets/cookieconsent/cc-branding.css">
</head>
<body>
  <div class="box">
    <img class="logo" src="images/logo.png" alt="Yoga Nidra Italia™">
    <span class="eyebrow">Messaggio ricevuto</span>
    <h1>Grazie. <em>Ti rispondiamo presto.</em></h1>
    <p>
      Abbiamo ricevuto i tuoi recapiti e ti ricontatteremo personalmente
      al più presto. Nel frattempo, il limbo tra veglia e sonno ti aspetta.
    </p>
    <a class="btn" href="/">← Torna alla home</a>
  </div>
<script defer src="/assets/cookieconsent/cookieconsent.umd.js"></script>
<script defer src="/assets/cookieconsent/cc-config.js"></script>
</body>
</html>
